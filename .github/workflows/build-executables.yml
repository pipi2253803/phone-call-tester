name: Build Desktop Executables

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]
    paths:
      - 'phone_call_tester.py'
      - 'build_executable.*'
      - '.github/workflows/build-executables.yml'

jobs:
  # Windows 打包
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 pandas openpyxl
    
    - name: Build Windows executable
      run: |
        python -m PyInstaller --name="PhoneCallTester" --windowed --onefile --clean --noconfirm --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --hidden-import=pandas --hidden-import=openpyxl --exclude-module=matplotlib --exclude-module=scipy --exclude-module=tkinter phone_call_tester.py
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneCallTester-Windows
        path: dist/PhoneCallTester.exe
        if-no-files-found: error

  # macOS 打包
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 pandas openpyxl
    
    - name: Build macOS executable
      run: |
        python -m PyInstaller --name="PhoneCallTester" --windowed --onefile --clean --noconfirm --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --hidden-import=pandas --hidden-import=openpyxl --exclude-module=matplotlib --exclude-module=scipy --exclude-module=tkinter phone_call_tester.py
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneCallTester-macOS
        path: dist/PhoneCallTester.app
        if-no-files-found: error

  # Linux 打包
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libxkbcommon-x11-0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 pandas openpyxl
    
    - name: Build Linux executable
      run: |
        python -m PyInstaller --name="PhoneCallTester" --windowed --onefile --clean --noconfirm --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --hidden-import=pandas --hidden-import=openpyxl --exclude-module=matplotlib --exclude-module=scipy --exclude-module=tkinter phone_call_tester.py
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneCallTester-Linux
        path: dist/PhoneCallTester
        if-no-files-found: error
