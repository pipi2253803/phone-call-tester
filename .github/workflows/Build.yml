name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-WebEngine folium requests pyinstaller
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "PhoneCallTester" phone_call_tester.py
    
    - name: Copy additional files
      run: |
        copy README.md dist\
        copy VERSION.md dist\
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: PhoneCallTester-Windows
        path: dist/
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/PhoneCallTester.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-WebEngine folium requests pyinstaller
    
    - name: Build macOS App
      run: |
        pyinstaller --onefile --windowed --name "PhoneCallTester" phone_call_tester.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: PhoneCallTester-macOS
        path: dist/
